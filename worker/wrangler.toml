# Banana sticker fulfilment worker — see worker/README.md for setup.
name = "banana-sticker"
main = "src/index.js"
compatibility_date = "2026-07-01"

[[r2_buckets]]
binding = "DESIGNS"
bucket_name = "banana-designs"

[vars]
# Origins allowed to upload designs (prod site first, then local dev)
ALLOWED_ORIGIN = "https://trymstene.com,http://localhost:8803"
# Printful catalog variant: Kiss-Cut Stickers (product 358), 3"x3", cost $2.25
PRINTFUL_VARIANT_ID = "10163"
# The "banana-fulfilment" dev-dashboard app's client id (public identifier;
# pairs with the SHOPIFY_CLIENT_SECRET secret for the client-credentials grant)
SHOPIFY_CLIENT_ID = "c9bd1c56d512f6498991f7a20a7d6f62"

# Daily temp-product sweep (per-order checkout-image products, tag custom-temp)
[triggers]
crons = ["17 3 * * *"]

# Secrets — set with `npx wrangler secret put <NAME>` (NEVER commit values):
#   PRINTFUL_TOKEN          Printful API token (Printful -> Settings -> API)
#   SHOPIFY_WEBHOOK_SECRET  Shopify webhook signing secret (shown in
#                           Shopify admin -> Settings -> Notifications -> Webhooks)
#   SHOPIFY_CLIENT_SECRET   the "banana-fulfilment" dev-dashboard app's Secret
#                           (Settings -> Credentials; scopes write_products,
#                           read_products, write_publications,
#                           read_publications) — the worker exchanges it for
#                           short-lived Admin tokens (client-credentials grant)
#                           to power per-order checkout-image products; absent =
#                           feature off, clients fall back to the shared variant
#   SHOPIFY_ADMIN_TOKEN     (legacy alternative: a permanent shpat_ Admin token;
#                           takes precedence over the grant if ever set)
