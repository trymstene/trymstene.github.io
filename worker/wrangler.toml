# Banana sticker fulfilment worker — see worker/README.md for setup.
name = "banana-sticker"
main = "src/index.js"
compatibility_date = "2026-07-01"

[[r2_buckets]]
binding = "DESIGNS"
bucket_name = "banana-designs"

[vars]
# Origins allowed to upload designs (prod site first, then local dev)
ALLOWED_ORIGIN = "https://trymstene.com,http://localhost:8803"
# Printful catalog variant: Kiss-Cut Stickers (product 358), 3"x3", cost $2.25
PRINTFUL_VARIANT_ID = "10163"

# Secrets — set with `npx wrangler secret put <NAME>` (NEVER commit values):
#   PRINTFUL_TOKEN          Printful API token (Printful -> Settings -> API)
#   SHOPIFY_WEBHOOK_SECRET  Shopify webhook signing secret (shown in
#                           Shopify admin -> Settings -> Notifications -> Webhooks)
