name: Deploy to GitHub Pages

# Builds the Astro site and publishes it to GitHub Pages on every push to main.
# Requires: repo Settings → Pages → Build and deployment → Source = "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Latest push wins: cancel any in-progress deploy. (A Pages-side stall on
# 2 Jul 2026 left a deploy job hung for 13h; with cancel-in-progress: false
# every new push queued behind it forever. Cancelling is safe — deploys are
# atomic and a newer push always carries the full site.)
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
