name: Deploy to GitHub Pages

# Builds the Astro site and pushes the output to the `gh-pages` branch.
# Requires: repo Settings → Pages → Build and deployment →
#   Source = "Deploy from a branch", Branch = gh-pages / (root).
#
# WHY branch-based: the artifact API path (upload-pages-artifact +
# deploy-pages) failed 5 consecutive deploys on 3 Jul 2026 with a generic
# backend "Deployment failed, try again later" (builds green, artifact fine,
# no incident on githubstatus.com) — second such wave in two days. Pushing to
# a branch and letting GitHub's own pages-build-deployment pipeline publish it
# is the boring, battle-tested path. dist/ already contains CNAME + .nojekyll
# (they live in public/), so no extra config here.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

# Latest push wins: cancel any in-progress deploy. (A Pages-side stall on
# 2 Jul 2026 left a deploy job hung for 13h; with cancel-in-progress: false
# every new push queued behind it forever. Cancelling is safe — deploys are
# atomic and a newer push always carries the full site.)
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Publish dist to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true

      # IndexNow: tell Bing/DuckDuckGo/Seznam etc. the site changed (minutes
      # instead of weeks). Google ignores it; harmless if the ping fails.
      - name: Ping IndexNow
        continue-on-error: true
        run: |
          curl -s -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d '{
              "host": "trymstene.com",
              "key": "a68abc54470f9a4662b2bbc53c2c0ab2",
              "keyLocation": "https://trymstene.com/a68abc54470f9a4662b2bbc53c2c0ab2.txt",
              "urlList": [
                "https://trymstene.com/",
                "https://trymstene.com/dancing-banana-gif-meme/",
                "https://trymstene.com/make-a-banana/",
                "https://trymstene.com/dancing-banana-emoji/",
                "https://trymstene.com/peanut-butter-jelly-time/",
                "https://trymstene.com/license-the-dancing-banana/",
                "https://trymstene.com/shop/"
              ]
            }'
